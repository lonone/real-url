n: OK (SM3 + a_bogus + class)')\n\n# Test 4: tiktok\nassert hasattr(tiktok, 'TikTok') and hasattr(tiktok, 'get_real_url')\nprint('tiktok: OK')\n\n# Full API test for douyin (functional verification)\nr = douyin.get_real_url('CCTV1')\nprint(f'douyin CCTV1: {list(r.keys())[:3]}' if 'error' not in r else f'douyin CCTV1: {r[\\\"error\\\"][:60]}')\n\nprint()\nprint('=== ALL 4 VERIFIED ===')\n\")", "Bash(cd /c/worker/real-url && rm -f _test_biliup.py _test_huya_desktop.py && ls *.py)"]
